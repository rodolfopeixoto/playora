name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust + aarch64 target
        run: |
          rustup target add aarch64-unknown-linux-gnu
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build aarch64
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu \
            -p playora-agent -p playora-server
      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp target/aarch64-unknown-linux-gnu/release/playora-agent  dist/playora-agent-aarch64
          cp target/aarch64-unknown-linux-gnu/release/playora-server dist/playora-server-aarch64
          chmod 0755 dist/playora-agent-aarch64 dist/playora-server-aarch64
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/playora-agent-aarch64
            dist/playora-server-aarch64
            scripts/install-to-sd.sh
